<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0E2E"/>
      <stop offset="50%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <radialGradient id="atmos" cx="22%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="saco-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="off-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="600" height="240" rx="16" fill="url(#bg)"/>
  <rect width="600" height="240" rx="16" fill="url(#atmos)"/>

  <!-- Saco de ração — elemento visual esquerdo, limpo -->
  <g transform="translate(130,122)" filter="url(#soft)">
    <!-- Corpo do saco -->
    <rect x="-62" y="-90" width="124" height="158" rx="14" fill="url(#saco-grad)"/>
    <!-- Lacre superior -->
    <rect x="-44" y="-100" width="88" height="18" rx="8" fill="#9A3412"/>
    <!-- Rótulo branco central -->
    <rect x="-48" y="-45" width="96" height="74" rx="10" fill="white" opacity="0.96"/>
    <!-- Texto do rótulo -->
    <text x="0" y="-18" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="800"
          fill="#92400E" letter-spacing="1">RAÇÃO</text>
    <text x="0" y="0" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600"
          fill="#B45309" letter-spacing="2">PREMIUM</text>
    <!-- Estrelas no rótulo -->
    <text x="0" y="22" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="16"
          fill="#F59E0B">★★★</text>
    <!-- Brilho no saco -->
    <rect x="-56" y="-78" width="16" height="130" rx="8" fill="white" opacity="0.1"/>
  </g>

  <!-- Badge "15% OFF" — circular, elegante, overlapping -->
  <g transform="translate(226,54)" filter="url(#soft)">
    <circle r="40" fill="url(#off-grad)"/>
    <circle r="35" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <text x="0" y="-5" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="19" font-weight="900"
          fill="white">15%</text>
    <text x="0" y="16" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="800"
          fill="white">OFF</text>
    <ellipse cx="-14" cy="-22" rx="9" ry="5" fill="white" opacity="0.18" transform="rotate(-25,-14,-22)"/>
  </g>

  <!-- Separador vertical -->
  <line x1="240" y1="36" x2="240" y2="204" stroke="white" stroke-width="1" opacity="0.12"/>

  <!-- Área tipográfica -->
  <!-- Tag -->
  <rect x="268" y="42" width="76" height="22" rx="11" fill="#F59E0B" opacity="0.2"/>
  <text x="306" y="57" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600"
        fill="#FCD34D" letter-spacing="1.5">PETSHOP</text>

  <!-- Título -->
  <text x="268" y="100"
        font-family="'Segoe UI', Arial, sans-serif" font-size="30" font-weight="800"
        fill="white" letter-spacing="-0.5">Ração Premium</text>
  <text x="268" y="132"
        font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600"
        fill="#C7D2FE" letter-spacing="-0.3">com Preço Especial</text>

  <!-- Descrição -->
  <text x="268" y="162"
        font-family="'Segoe UI', Arial, sans-serif" font-size="13"
        fill="#E0E7FF" opacity="0.75">Seleção para diferentes portes e idades.</text>

  <!-- Preço destaque -->
  <text x="268" y="200"
        font-family="'Segoe UI', Arial, sans-serif" font-size="12"
        fill="#A5B4FC" opacity="0.8">economize</text>
  <text x="268" y="222"
        font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="900"
        fill="white">até 15% OFF</text>

  <!-- Kibble decorativo — 3 bolinhas no canto -->
  <circle cx="560" cy="48"  r="7" fill="#F97316" opacity="0.35"/>
  <circle cx="578" cy="38"  r="5" fill="#EA580C" opacity="0.28"/>
  <circle cx="572" cy="62"  r="6" fill="#C2410C" opacity="0.28"/>
</svg>
