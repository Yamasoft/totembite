<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#130428"/>
      <stop offset="100%" stop-color="#1E0A40"/>
    </linearGradient>
    <radialGradient id="atmos" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="predio-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </linearGradient>
    <linearGradient id="janela-acesa" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="280" rx="14" fill="url(#bg)"/>
  <rect width="400" height="280" rx="14" fill="url(#atmos)"/>

  <!-- Chão / calçada -->
  <rect x="0" y="238" width="400" height="42" rx="0" fill="#1E0A40" opacity="0.7"/>
  <rect x="0" y="238" width="400" height="4"  fill="#4C1D95" opacity="0.6"/>

  <!-- Prédio do Shopping — elemento principal, arquitetônico, limpo -->
  <g filter="url(#soft)">
    <!-- Corpo central -->
    <rect x="88"  y="96"  width="224" height="146" rx="4" fill="url(#predio-grad)"/>
    <!-- Torres laterais -->
    <rect x="62"  y="122" width="62"  height="120" rx="4" fill="#3B0764"/>
    <rect x="276" y="118" width="62"  height="124" rx="4" fill="#3B0764"/>
    <!-- Fachada topo (cornija) -->
    <rect x="82"  y="88"  width="236" height="12"  rx="4" fill="#5B21B6"/>
    <rect x="56"  y="112" width="74"  height="12"  rx="4" fill="#4C1D95"/>
    <rect x="270" y="108" width="74"  height="12"  rx="4" fill="#4C1D95"/>
    <!-- Entrada / portal -->
    <rect x="164" y="196" width="72"  height="48"  rx="4" fill="#0F0620"/>
    <rect x="170" y="202" width="26"  height="36"  rx="3" fill="#60A5FA" opacity="0.18"/>
    <rect x="204" y="202" width="26"  height="36"  rx="3" fill="#60A5FA" opacity="0.18"/>

    <!-- Janelas — torres laterais -->
    <rect x="74"  y="134" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="100" y="134" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.9"/>
    <rect x="74"  y="164" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.85"/>
    <rect x="100" y="164" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="74"  y="194" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.6"/>
    <rect x="100" y="194" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.8"/>
    <rect x="282" y="130" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.9"/>
    <rect x="308" y="130" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="282" y="160" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.65"/>
    <rect x="308" y="160" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.85"/>
    <rect x="282" y="190" width="18" height="20" rx="3" fill="url(#janela-acesa)" opacity="0.8"/>
    <rect x="308" y="190" width="18" height="20" rx="3" fill="#6D28D9" opacity="0.6"/>

    <!-- Janelas — corpo central (3 colunas × 3 fileiras) -->
    <rect x="106" y="110" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="140" y="110" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.9"/>
    <rect x="174" y="110" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.65"/>
    <rect x="208" y="110" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.88"/>
    <rect x="242" y="110" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="276" y="110" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.85"/>
    <rect x="106" y="144" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.85"/>
    <rect x="140" y="144" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="174" y="144" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.9"/>
    <rect x="208" y="144" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.65"/>
    <rect x="242" y="144" width="20" height="24" rx="3" fill="url(#janela-acesa)" opacity="0.88"/>
    <rect x="276" y="144" width="20" height="24" rx="3" fill="#6D28D9" opacity="0.7"/>
    <rect x="106" y="178" width="20" height="14" rx="3" fill="#6D28D9" opacity="0.6"/>
    <rect x="140" y="178" width="20" height="14" rx="3" fill="url(#janela-acesa)" opacity="0.8"/>
    <rect x="242" y="178" width="20" height="14" rx="3" fill="url(#janela-acesa)" opacity="0.82"/>
    <rect x="276" y="178" width="20" height="14" rx="3" fill="#6D28D9" opacity="0.6"/>

    <!-- Placa METRÓPOLE -->
    <rect x="136" y="94" width="128" height="22" rx="5" fill="#5B21B6" opacity="0.85"/>
    <text x="200" y="109" text-anchor="middle"
          font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700"
          fill="white" letter-spacing="2" opacity="0.95">METRÓPOLE</text>
  </g>

  <!-- Balões — 3, simples e elegantes -->
  <!-- Balão esq. -->
  <ellipse cx="72"  cy="82" rx="20" ry="26" fill="#EC4899" filter="url(#soft)" opacity="0.85"/>
  <ellipse cx="66"  cy="70" rx="7"  ry="4.5" fill="white" opacity="0.28"/>
  <path d="M72,108 Q69,120 72,128" fill="none" stroke="#EC4899" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Balão centro -->
  <ellipse cx="118" cy="66" rx="18" ry="23" fill="#FCD34D" filter="url(#soft)" opacity="0.82"/>
  <ellipse cx="113" cy="56" rx="6"  ry="4"   fill="white" opacity="0.28"/>
  <path d="M118,89 Q115,100 118,108" fill="none" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  <!-- Balão dir. -->
  <ellipse cx="328" cy="74" rx="20" ry="26" fill="#34D399" filter="url(#soft)" opacity="0.82"/>
  <ellipse cx="322" cy="63" rx="7"  ry="4.5" fill="white" opacity="0.25"/>
  <path d="M328,100 Q325,112 328,120" fill="none" stroke="#34D399" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>

  <!-- Confetes — pontos muito pequenos, sutis -->
  <g opacity="0.45">
    <rect x="44"  y="135" width="7" height="4" rx="2" fill="#EC4899" transform="rotate(30,47,137)"/>
    <rect x="358" y="120" width="7" height="4" rx="2" fill="#FCD34D" transform="rotate(-25,361,122)"/>
    <rect x="50"  y="188" width="6" height="4" rx="2" fill="#34D399" transform="rotate(15,53,190)"/>
    <rect x="360" y="188" width="6" height="4" rx="2" fill="#EC4899" transform="rotate(-40,363,190)"/>
    <circle cx="42"  cy="162" r="3" fill="#FCD34D"/>
    <circle cx="362" cy="148" r="3" fill="#34D399"/>
  </g>
</svg>
