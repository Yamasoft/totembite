<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <radialGradient id="atmos" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="escudo" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#059669" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="400" height="280" rx="14" fill="url(#bg)"/>
  <rect width="400" height="280" rx="14" fill="url(#atmos)"/>

  <!-- Raios de campanha — linhas radiais saindo do centro -->
  <g transform="translate(200,132)" opacity="0.08" stroke="white" stroke-width="1.5" stroke-linecap="round">
    <line x1="0" y1="0" x2="0"   y2="-138"/>
    <line x1="0" y1="0" x2="96"  y2="-96"/>
    <line x1="0" y1="0" x2="138" y2="0"/>
    <line x1="0" y1="0" x2="96"  y2="96"/>
    <line x1="0" y1="0" x2="0"   y2="138"/>
    <line x1="0" y1="0" x2="-96" y2="96"/>
    <line x1="0" y1="0" x2="-138" y2="0"/>
    <line x1="0" y1="0" x2="-96" y2="-96"/>
  </g>

  <!-- Escudo — elemento principal -->
  <path d="M200,34 L272,64 L272,130 Q272,184 200,206 Q128,184 128,130 L128,64 Z"
        fill="url(#escudo)" filter="url(#soft)"/>
  <!-- Borda interna do escudo -->
  <path d="M200,46 L262,73 L262,128 Q262,178 200,197 Q138,178 138,128 L138,73 Z"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Brilho no escudo -->
  <path d="M148,72 Q143,90 148,110" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.22"/>

  <!-- Cruz médica — dentro do escudo, limpa -->
  <rect x="186" y="96"  width="28" height="84" rx="7" fill="white" opacity="0.95"/>
  <rect x="158" y="122" width="84" height="28" rx="7" fill="white" opacity="0.95"/>

  <!-- Patinhas em volta — 4 patas simétricas, brand marks -->
  <g opacity="0.22" fill="#34D399">
    <!-- Sup. esq. -->
    <g transform="translate(82,52)">
      <ellipse cx="0" cy="6" rx="8" ry="7"/>
      <ellipse cx="-6" cy="0"  rx="4" ry="5"/>
      <ellipse cx="-2" cy="-5" rx="4" ry="5"/>
      <ellipse cx="3"  cy="-5" rx="4" ry="5"/>
      <ellipse cx="7"  cy="0"  rx="4" ry="5"/>
    </g>
    <!-- Sup. dir. -->
    <g transform="translate(318,52)">
      <ellipse cx="0" cy="6" rx="8" ry="7"/>
      <ellipse cx="-6" cy="0"  rx="4" ry="5"/>
      <ellipse cx="-2" cy="-5" rx="4" ry="5"/>
      <ellipse cx="3"  cy="-5" rx="4" ry="5"/>
      <ellipse cx="7"  cy="0"  rx="4" ry="5"/>
    </g>
    <!-- Inf. esq. -->
    <g transform="translate(72,215)">
      <ellipse cx="0" cy="6" rx="8" ry="7"/>
      <ellipse cx="-6" cy="0"  rx="4" ry="5"/>
      <ellipse cx="-2" cy="-5" rx="4" ry="5"/>
      <ellipse cx="3"  cy="-5" rx="4" ry="5"/>
      <ellipse cx="7"  cy="0"  rx="4" ry="5"/>
    </g>
    <!-- Inf. dir. -->
    <g transform="translate(328,215)">
      <ellipse cx="0" cy="6" rx="8" ry="7"/>
      <ellipse cx="-6" cy="0"  rx="4" ry="5"/>
      <ellipse cx="-2" cy="-5" rx="4" ry="5"/>
      <ellipse cx="3"  cy="-5" rx="4" ry="5"/>
      <ellipse cx="7"  cy="0"  rx="4" ry="5"/>
    </g>
  </g>

  <!-- Seringa pequena — decorativa, inclinada, canto inf. dir. -->
  <g transform="translate(326,228) rotate(-40)" opacity="0.45">
    <rect x="-2.5" y="-32" width="5" height="10" rx="2.5" fill="#94A3B8"/>
    <path d="M-2.5,-22 L-5,-14 L5,-14 Z" fill="#CBD5E1"/>
    <rect x="-8" y="-14" width="16" height="40" rx="3" fill="#A7F3D0"/>
    <rect x="-5" y="8"   width="10" height="14" rx="3" fill="#34D399" opacity="0.9"/>
    <rect x="-8" y="24"  width="16" height="5"  rx="2.5" fill="#CBD5E1"/>
  </g>
</svg>
