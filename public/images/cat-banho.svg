<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="ic" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#29b6f6"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#01579b" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- background depth circles -->
  <circle cx="172" cy="28"  r="50" fill="#81d4fa" opacity="0.26"/>
  <circle cx="16"  cy="178" r="38" fill="#81d4fa" opacity="0.20"/>

  <!-- water drop -->
  <g filter="url(#sh)">
    <path d="M100,46 C80,46 52,96 52,130 A48,48 0,0,0 148,130 C148,96 120,46 100,46Z"
          fill="url(#ic)"/>
    <!-- inner shine -->
    <ellipse cx="84" cy="92" rx="9" ry="20"
             fill="white" opacity="0.26"
             transform="rotate(-14 84 92)"/>
  </g>

  <!-- small paw inside drop -->
  <g opacity="0.76">
    <ellipse cx="100" cy="135" rx="9.5" ry="8"   fill="white"/>
    <ellipse cx="88"  cy="123" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="100" cy="120" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="112" cy="123" rx="4.5" ry="5.5" fill="white"/>
  </g>

  <!-- bubbles -->
  <circle cx="154" cy="76" r="11" fill="#81d4fa" opacity="0.55"/>
  <circle cx="48"  cy="88" r="7"  fill="#81d4fa" opacity="0.45"/>
  <circle cx="158" cy="52" r="6"  fill="#81d4fa" opacity="0.42"/>
  <circle cx="144" cy="44" r="4"  fill="#81d4fa" opacity="0.36"/>
</svg>
