<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f8e9"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
    <linearGradient id="ic" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1b5e20" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- background depth circles -->
  <circle cx="174" cy="28"  r="52" fill="#a5d6a7" opacity="0.26"/>
  <circle cx="18"  cy="180" r="40" fill="#a5d6a7" opacity="0.20"/>

  <!-- paw icon -->
  <g filter="url(#sh)">
    <!-- 4 digital pads -->
    <ellipse cx="67"  cy="84"  rx="13" ry="16" fill="url(#ic)"/>
    <ellipse cx="88"  cy="71"  rx="13" ry="16" fill="url(#ic)"/>
    <ellipse cx="112" cy="71"  rx="13" ry="16" fill="url(#ic)"/>
    <ellipse cx="133" cy="84"  rx="13" ry="16" fill="url(#ic)"/>
    <!-- metacarpal pad -->
    <ellipse cx="100" cy="122" rx="34" ry="27" fill="url(#ic)"/>
  </g>

  <!-- highlight -->
  <ellipse cx="100" cy="111" rx="16" ry="11" fill="white" opacity="0.20"/>
</svg>
