<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080E1A"/>
      <stop offset="100%" stop-color="#0F1E32"/>
    </linearGradient>
    <radialGradient id="atmos" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="400" height="280" rx="14" fill="url(#bg)"/>
  <rect width="400" height="280" rx="14" fill="url(#atmos)"/>

  <!-- Silhueta do cão — perfil lateral limpo, sem traços faciais -->
  <g opacity="0.18">
    <!-- Cabeça -->
    <path d="M58,182 Q58,148 88,138 Q108,130 118,142 Q128,130 142,136 Q162,144 162,168 Q162,190 140,200 Q120,208 96,200 Q68,194 58,182 Z"
          fill="#3B82F6"/>
    <!-- Corpo -->
    <path d="M140,200 Q190,215 220,208 Q256,200 260,178 Q264,156 240,148 Q220,140 200,145 Q180,150 162,168 Z"
          fill="#3B82F6"/>
    <!-- Perna traseira -->
    <path d="M220,208 Q228,230 222,252 L210,252 Q208,232 204,212 Z" fill="#3B82F6"/>
    <!-- Perna dianteira -->
    <path d="M108,202 Q112,228 108,252 L96,252 Q94,228 98,200 Z" fill="#3B82F6"/>
    <!-- Rabo -->
    <path d="M258,178 Q280,162 282,142 Q284,126 272,128 Q262,130 266,148 Q268,162 252,172 Z" fill="#3B82F6"/>
  </g>

  <!-- Linha de corte (tracejada, horizontal, sutil) -->
  <line x1="42" y1="178" x2="290" y2="178"
        stroke="#60A5FA" stroke-width="1.5" stroke-dasharray="7,5" opacity="0.4"/>

  <!-- TESOURA — elemento principal centralizado -->
  <g transform="translate(200,130) rotate(38)" filter="url(#soft)">
    <!-- Anel sup. -->
    <circle cx="0" cy="-72" r="20" fill="none" stroke="url(#handle)" stroke-width="8"/>
    <!-- Haste sup. -->
    <rect x="-5" y="-52" width="10" height="68" rx="5" fill="url(#blade)"/>
    <!-- Anel inf. -->
    <circle cx="14" cy="-68" r="20" fill="none" stroke="url(#handle)" stroke-width="8"/>
    <!-- Haste inf. -->
    <rect x="9" y="-48" width="10" height="64" rx="5" fill="url(#blade)"/>
    <!-- Parafuso -->
    <circle cx="6" cy="16" r="7" fill="#64748B"/>
    <circle cx="6" cy="16" r="3.5" fill="#94A3B8"/>
    <!-- Lâmina sup. -->
    <path d="M-5,22 Q-3,24 14,88 Q8,90 2,88 Q-4,68 -5,22 Z" fill="url(#blade)"/>
    <!-- Lâmina inf. -->
    <path d="M11,22 Q12,24 30,88 Q24,91 18,89 Q12,68 11,22 Z" fill="url(#blade)"/>
    <!-- Brilho lâmina sup. -->
    <path d="M-2,26 Q-1,40 6,76" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Brilho lâmina inf. -->
    <path d="M13,26 Q14,40 22,76" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Pelos cortados caindo — 4 linhas finas, orgânicas -->
  <path d="M268,192 Q272,206 265,214" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M280,185 Q285,198 278,207" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M290,196 Q296,208 289,216" fill="none" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <path d="M276,175 Q282,188 274,197" fill="none" stroke="#CBD5E1" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>

  <!-- Reflexo metálico na tesoura (lustre) -->
  <ellipse cx="192" cy="100" rx="6" ry="3" fill="white" opacity="0.25" transform="rotate(38,192,100)"/>

  <!-- Patinha — brand mark, canto inf. dir., muito sutil -->
  <g transform="translate(355,245)" opacity="0.12">
    <ellipse cx="0" cy="7" rx="10" ry="9" fill="white"/>
    <ellipse cx="-7" cy="0"  rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="-2" cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="4"  cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="9"  cy="0"  rx="4.5" ry="5.5" fill="white"/>
  </g>
</svg>
