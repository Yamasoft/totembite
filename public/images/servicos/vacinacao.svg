<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
    <radialGradient id="atmos" cx="50%" cy="50%" r="52%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seringa-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D1FAE5"/>
      <stop offset="100%" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="liquido" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="400" height="280" rx="14" fill="url(#bg)"/>
  <rect width="400" height="280" rx="14" fill="url(#atmos)"/>

  <!-- Escudo — traço elegante atrás da seringa -->
  <path d="M200,38 L258,62 L258,122 Q258,168 200,188 Q142,168 142,122 L142,62 Z"
        fill="none" stroke="#34D399" stroke-width="2" opacity="0.35"/>
  <path d="M200,48 L250,70 L250,120 Q250,160 200,178 Q150,160 150,120 L150,70 Z"
        fill="none" stroke="#34D399" stroke-width="1" opacity="0.2"/>

  <!-- Seringa — elemento principal, inclinada 30° -->
  <g transform="translate(200,138) rotate(-28)" filter="url(#soft)">
    <!-- Agulha -->
    <rect x="-3" y="-120" width="6" height="24" rx="3" fill="#94A3B8"/>
    <!-- Cone de conexão -->
    <path d="M-3,-96 L-9,-80 L9,-80 L3,-96 Z" fill="#CBD5E1"/>
    <!-- Corpo da seringa -->
    <rect x="-15" y="-80" width="30" height="96" rx="4" fill="url(#seringa-body)" opacity="0.97"/>
    <!-- Líquido (vacina) -->
    <rect x="-11" y="-28" width="22" height="40" rx="3" fill="url(#liquido)" opacity="0.92"/>
    <!-- Marcações de ml -->
    <line x1="-14" y1="-60" x2="-9" y2="-60" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-14" y1="-46" x2="-9" y2="-46" stroke="#64748B" stroke-width="1.5"/>
    <line x1="-14" y1="-32" x2="-9" y2="-32" stroke="#64748B" stroke-width="1.5"/>
    <!-- Êmbolo -->
    <rect x="-10" y="-80" width="20" height="7" rx="3.5" fill="#B0C4D8"/>
    <rect x="-7"  y="-90" width="14" height="12" rx="3" fill="#94A3B8"/>
    <rect x="-15" y="-95" width="30" height="7" rx="3.5" fill="#78909C"/>
    <!-- Anel de dedo -->
    <rect x="-18" y="-75" width="7"  height="16" rx="3.5" fill="#90A4AE"/>
    <rect x="11"  y="-75" width="7"  height="16" rx="3.5" fill="#90A4AE"/>
    <!-- Tampa inferior -->
    <rect x="-15" y="14"  width="30" height="8" rx="4" fill="#B0C4D8"/>
    <!-- Brilho lateral na seringa -->
    <rect x="-12" y="-74" width="5" height="82" rx="2.5" fill="white" opacity="0.22"/>
  </g>

  <!-- Tipografia V8/V10 — destaque limpo, lado direito -->
  <text x="298" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900"
        fill="white" opacity="0.92" letter-spacing="-1">V8</text>
  <line x1="298" y1="126" x2="346" y2="126" stroke="#34D399" stroke-width="2" opacity="0.6"/>
  <text x="298" y="152" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="900"
        fill="white" opacity="0.92" letter-spacing="-1">V10</text>
  <text x="298" y="172" font-family="'Segoe UI', Arial, sans-serif" font-size="11"
        fill="#6EE7B7" opacity="0.8" letter-spacing="1.5">ANTIRRÁBICA</text>

  <!-- Pontos de check (proteção) — discretos -->
  <g opacity="0.5">
    <circle cx="62" cy="68" r="3.5" fill="#34D399"/>
    <circle cx="338" cy="220" r="3" fill="#34D399"/>
    <circle cx="55" cy="192" r="2.5" fill="#34D399"/>
    <circle cx="352" cy="62" r="3" fill="#34D399"/>
  </g>

  <!-- Patinha — brand mark, canto inf. esq. -->
  <g transform="translate(48,246)" opacity="0.11">
    <ellipse cx="0" cy="7" rx="10" ry="9" fill="white"/>
    <ellipse cx="-7" cy="0"  rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="-2" cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="4"  cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="9"  cy="0"  rx="4.5" ry="5.5" fill="white"/>
  </g>
</svg>
