<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" width="400" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C0E2E"/>
      <stop offset="100%" stop-color="#151940"/>
    </linearGradient>
    <radialGradient id="atmos" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tubo-glass" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="liq-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="liq-y" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="liq-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="soft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="400" height="280" rx="14" fill="url(#bg)"/>
  <rect width="400" height="280" rx="14" fill="url(#atmos)"/>

  <!-- Grade técnica muito sutil -->
  <g opacity="0.055" stroke="#818CF8" stroke-width="0.8">
    <line x1="0" y1="70"  x2="400" y2="70"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
    <line x1="0" y1="210" x2="400" y2="210"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
  </g>

  <!-- Suporte de rack dos tubos -->
  <rect x="110" y="178" width="180" height="14" rx="7" fill="#1E1B4B" filter="url(#soft)"/>
  <rect x="126" y="160" width="12" height="22" rx="6" fill="#1E1B4B"/>
  <rect x="264" y="160" width="12" height="22" rx="6" fill="#1E1B4B"/>

  <!-- Tubo 1 — vermelho (hemograma), maior, central-esq -->
  <g transform="translate(152,102)" filter="url(#soft)">
    <rect x="-11" y="-80" width="22" height="100" rx="11" fill="url(#tubo-glass)" opacity="0.96"/>
    <rect x="-8"  y="-10" width="16" height="46"  rx="8" fill="url(#liq-r)" opacity="0.9"/>
    <rect x="-11" y="-80" width="22" height="10"  rx="6" fill="#FDA4AF"/>
    <!-- Brilho -->
    <rect x="-9" y="-74" width="5" height="80" rx="2.5" fill="white" opacity="0.28"/>
  </g>

  <!-- Tubo 2 — amarelo (bioquímica), mais alto, central -->
  <g transform="translate(200,90)" filter="url(#soft)">
    <rect x="-12" y="-92" width="24" height="112" rx="12" fill="url(#tubo-glass)" opacity="0.97"/>
    <rect x="-9"  y="-8"  width="18" height="52"  rx="9" fill="url(#liq-y)" opacity="0.88"/>
    <rect x="-12" y="-92" width="24" height="12"  rx="7" fill="#FCD34D"/>
    <rect x="-10" y="-86" width="6"  height="88"  rx="3" fill="white" opacity="0.24"/>
  </g>

  <!-- Tubo 3 — verde (bioquímica 2), menor, central-dir -->
  <g transform="translate(248,110)" filter="url(#soft)">
    <rect x="-10" y="-68" width="20" height="88"  rx="10" fill="url(#tubo-glass)" opacity="0.95"/>
    <rect x="-7"  y="4"   width="14" height="42"  rx="7" fill="url(#liq-g)" opacity="0.88"/>
    <rect x="-10" y="-68" width="20" height="10"  rx="6" fill="#4ADE80"/>
    <rect x="-8"  y="-62" width="5"  height="68"  rx="2.5" fill="white" opacity="0.26"/>
  </g>

  <!-- Microscópio — silhueta linha art, canto esquerdo -->
  <g transform="translate(78,148)" stroke="#6366F1" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.55">
    <!-- Base -->
    <rect x="-28" y="52" width="56" height="10" rx="5" fill="#1E1B4B" stroke="#6366F1"/>
    <!-- Coluna -->
    <rect x="-6"  y="-10" width="12" height="64" rx="6" fill="#1E1B4B" stroke="#6366F1"/>
    <!-- Braço horizontal -->
    <rect x="-6"  y="-10" width="36" height="10" rx="5" fill="#1E1B4B" stroke="#6366F1"/>
    <!-- Tubo ocular -->
    <rect x="24"  y="-42" width="10" height="34" rx="5" fill="#1E1B4B" stroke="#6366F1" transform="rotate(15,29,-25)"/>
    <!-- Ocular -->
    <circle cx="35" cy="-45" r="9" fill="#1E1B4B" stroke="#6366F1"/>
    <!-- Objetiva -->
    <rect x="-4" y="34" width="8" height="20" rx="4" fill="#1E1B4B" stroke="#6366F1"/>
  </g>

  <!-- Moléculas decorativas — lado direito, abstratas -->
  <g opacity="0.28" stroke="#818CF8" stroke-width="1.5" fill="#4F46E5">
    <circle cx="338" cy="60" r="5"/>
    <circle cx="360" cy="48" r="4"/>
    <line x1="338" y1="60" x2="360" y2="48"/>
    <circle cx="350" cy="78" r="4"/>
    <line x1="338" y1="60" x2="350" y2="78"/>
    <circle cx="370" cy="72" r="3.5"/>
    <line x1="360" y1="48" x2="370" y2="72"/>
    <line x1="350" y1="78" x2="370" y2="72"/>
  </g>

  <!-- Patinha brand mark -->
  <g transform="translate(352,245)" opacity="0.1">
    <ellipse cx="0" cy="7" rx="10" ry="9" fill="white"/>
    <ellipse cx="-7" cy="0"  rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="-2" cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="4"  cy="-6" rx="4.5" ry="5.5" fill="white"/>
    <ellipse cx="9"  cy="0"  rx="4.5" ry="5.5" fill="white"/>
  </g>
</svg>
