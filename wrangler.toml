name            = "pet"
account_id      = "a0fc857ecf829a788a5499f86ad4c634"
main            = "worker.js"
compatibility_date = "2025-05-01"

# Assets estáticos — Vite build → dist/
[assets]
directory = "./dist"
binding   = "ASSETS"

# Variáveis de ambiente do Worker (não expostas ao frontend JS)
# API_BACKEND_URL → URL do backend Node.js no Railway/Render
# Substitua pela URL real após o deploy do servidor
[vars]
APP_NAME        = "Farmavet"
APP_ENV         = "production"
API_BACKEND_URL = "https://SUBSTITUA-PELA-URL-DO-RAILWAY.up.railway.app"
